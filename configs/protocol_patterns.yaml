# MOP AI Platform — Protocol & Vendor Pattern Configuration
#
# The grammar engine uses these patterns for:
#   1. Pre-LLM command detection (to count commands before LLM call)
#   2. Post-LLM validation (to cross-check LLM extracted commands)
#   3. Vendor/protocol tagging

vendors:
  cisco:
    display_name: "Cisco IOS/IOS-XE/IOS-XR/NX-OS"
    confidence_boost: 0.2
    exec_commands:
      # Show commands
      - pattern: "^show\\s+"
        mode: exec
      - pattern: "^ping\\s+"
        mode: exec
      - pattern: "^traceroute\\s+"
        mode: exec
      - pattern: "^debug\\s+"
        mode: exec
      - pattern: "^clear\\s+"
        mode: exec
      - pattern: "^reload\\b"
        mode: exec
      - pattern: "^copy\\s+"
        mode: exec
    config_commands:
      - pattern: "^configure\\s+terminal\\b"
        mode: config
      - pattern: "^conf\\s+t\\b"
        mode: config
      - pattern: "^interface\\s+"
        mode: config
      - pattern: "^router\\s+(bgp|ospf|isis|rip|eigrp)\\s+"
        mode: config
      - pattern: "^ip\\s+(route|address|prefix-list|access-list|community-list)\\s+"
        mode: config
      - pattern: "^mpls\\s+"
        mode: config
      - pattern: "^no\\s+"
        mode: config
      - pattern: "^end\\b"
        mode: config
      - pattern: "^exit\\b"
        mode: config

