# Patterns that indicate a line is a CLI command (vendor-agnostic)
generic_cli_indicators:
  # Cisco / Arista / Nokia
  - pattern: "^show\\s+\\w"
  - pattern: "^ping\\s+\\S"
  - pattern: "^traceroute\\s+\\S"
  - pattern: "^configure\\b"
  - pattern: "^conf\\s+t\\b"
  - pattern: "^set\\s+\\w"
  - pattern: "^no\\s+\\w"
  - pattern: "^interface\\s+\\w"
  - pattern: "^router\\s+(bgp|ospf|isis|rip|eigrp)"
  - pattern: "^commit\\b"
  - pattern: "^rollback\\b"
  - pattern: "^ip\\s+(route|address|bgp|ospf|prefix)"
  # Juniper
  - pattern: "^delete\\s+\\w"
  - pattern: "^deactivate\\s+"
  - pattern: "^activate\\s+"
  - pattern: "^edit\\s+\\w"
  - pattern: "^run\\s+show\\s+"
  - pattern: "^request\\s+system"
  # Huawei VRP
  - pattern: "^display\\s+\\w"
  - pattern: "^undo\\s+\\w"
  - pattern: "^system-view\\b"
  - pattern: "^tracert\\s+\\S"
  - pattern: "^quit\\b"
  # F5 TMSH
  - pattern: "^tmsh\\s+"
  - pattern: "^modify\\s+(ltm|net|sys)\\s+"
  - pattern: "^create\\s+(ltm|net|sys)\\s+"
  - pattern: "^save\\s+sys\\s+config"
  # Palo Alto
  - pattern: "^test\\s+(security-policy|routing|nat-policy)"
  # Check Point
  - pattern: "^fw\\s+"
  - pattern: "^cpinfo\\b"
  - pattern: "^cpstop\\b"
  - pattern: "^cpstart\\b"
  - pattern: "^clish\\s+"
  # Ericsson IPOS
  - pattern: "^context\\s+\\w"
  - pattern: "^service\\s+show\\s+"

# Patterns that look like CLI prompts (should be stripped from commands)
cli_prompt_patterns:
  # Generic prompt patterns
  - pattern: "^\\S+[>#]\\s*"
  - pattern: "^\\[\\S+\\]\\s*[>#]\\s*"
  # Cisco-style
  - pattern: "^PE\\d+[>#]\\s*"
  - pattern: "^CE\\d+[>#]\\s*"
  - pattern: "^R\\d+[>#]\\s*"
  - pattern: "^\\S+\\(config[\\w-]*\\)[>#]\\s*"
  # Juniper: [edit protocols bgp]
  - pattern: "^\\[edit[^\\]]*\\]\\s*"
  # Nokia SR OS: admin@PE1>
  - pattern: "^\\w+@[\\w.-]+[>#]\\s*"
  # Huawei: <PE1>
  - pattern: "^<[\\w.-]+>\\s*"
  # F5: root@bigip(Active)(tmos)#
  - pattern: "^\\w+@\\S+\\([^)]+\\)[>#]\\s*"
